<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Líneas de Crédito - Bonos Corporativos - Mills Capital Markets</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #0d0f14;
  --bg2: #13161e;
  --bg3: #1a1e28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0;
  --text2: #8b90a0;
  --text3: #555a6a;
  --green: #2ecc8a;
  --green-bg: rgba(46,204,138,0.1);
  --green-border: rgba(46,204,138,0.25);
  --yellow: #f0b429;
  --yellow-bg: rgba(240,180,41,0.1);
  --yellow-border: rgba(240,180,41,0.25);
  --red: #e85454;
  --red-bg: rgba(232,84,84,0.1);
  --red-border: rgba(232,84,84,0.25);
  --accent: #5b7fff;
  --accent-bg: rgba(91,127,255,0.1);
  --radius: 12px;
  --radius-sm: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

.header {
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100px; 
  position: sticky;
  top: 0;
  background: rgba(13,15,20,0.95);
  backdrop-filter: blur(12px);
  z-index: 100;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-logo {
  width: 72px;
  height: 72px;
  object-fit: contain;
  border-radius: 6px;
}
.header-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -0.01em;
}
.header-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.btn-refresh {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .2s;
  display: flex; align-items: center; gap: 6px;
}
.btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
.btn-refresh svg { width: 13px; height: 13px; }
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
}
.status-dot.loading { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: pulse 1s infinite; }
.status-dot.error { background: var(--red); box-shadow: 0 0 6px var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

.section-head {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 1.25rem;
}
.section-head h2 {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
}
.section-head span { font-size: 12px; color: var(--text3); }

.legend-bar {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .875rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.tl-indicator {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text2);
}
.tl-circle {
  width: 10px; height: 10px; border-radius: 50%;
}

.overview-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}
.chart-wrap { position: relative; width: 100%; height: 240px; }

.filters {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-bottom: 1.25rem;
}
.filters input {
  flex: 1; min-width: 220px;
  height: 38px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  padding: 0 14px;
  font-family: 'DM Sans', sans-serif;
  transition: border-color .2s;
}
.filters input:focus { outline: none; border-color: var(--accent); }
.filters input::placeholder { color: var(--text3); }
.filters select {
  height: 38px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-size: 13px;
  padding: 0 12px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
}
.filters select:focus { outline: none; }

.cards { display: flex; flex-direction: column; gap: 10px; }

.ccard {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .2s;
  cursor: pointer;
}
.ccard:hover { border-color: var(--border2); }
.ccard.expanded { border-color: var(--border2); }
.ccard.border-g { border-left: 3px solid var(--green); }
.ccard.border-y { border-left: 3px solid var(--yellow); }
.ccard.border-r { border-left: 3px solid var(--red); }

.ccard-head {
  display: flex; align-items: center; gap: 14px;
  padding: 1rem 1.25rem;
}

.score-ring {
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
  position: relative;
}
.score-ring svg {
  position: absolute; top: 0; left: 0;
  transform: rotate(-90deg);
}
.score-ring span { position: relative; z-index: 1; }
.ring-g { color: var(--green); }
.ring-y { color: var(--yellow); }
.ring-r { color: var(--red); }

.ccard-meta { flex: 1; min-width: 0; }
.ccard-name {
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: -0.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ccard-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

.traffic-light {
  display: flex; flex-direction: column; gap: 4px;
  align-items: center;
}
.tl-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,0.08);
  transition: background .2s, box-shadow .2s;
}
.tl-dot.on-g { background: var(--green); box-shadow: 0 0 8px var(--green); }
.tl-dot.on-y { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
.tl-dot.on-r { background: var(--red); box-shadow: 0 0 8px var(--red); }

.pill {
  font-size: 10px; padding: 2px 8px;
  border-radius: 20px; font-weight: 500;
  white-space: nowrap;
}
.pill-banco { background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(91,127,255,0.2); }
.pill-gen { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }

.chev {
  color: var(--text3); font-size: 10px;
  transition: transform .25s;
  flex-shrink: 0;
}
.chev.open { transform: rotate(180deg); }

.ccard-detail {
  display: none;
  border-top: 1px solid var(--border);
  padding: 1.25rem;
  animation: fadeIn .2s ease;
}
.ccard-detail.open { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
}
@media(max-width:680px){ .detail-grid { grid-template-columns: 1fr; } }

.sub-label {
  font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--text3);
  margin-bottom: .75rem;
}

.quali-list { display: flex; flex-direction: column; gap: 6px; }
.quali-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 10px;
  background: var(--bg3);
  border-radius: var(--radius-sm);
  font-size: 12px;
}
.quali-key { color: var(--text2); }
.quali-val { font-weight: 500; color: var(--text); }

.ratio-chips {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 6px;
}
.rchip {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
}
.rchip-label { font-size: 10px; color: var(--text3); line-height: 1.3; margin-bottom: 3px; }
.rchip-val { font-size: 13px; font-weight: 500; color: var(--text); }

.history-section { margin-top: 1.25rem; }
.history-chart-wrap { position: relative; width: 100%; height: 280px; margin-top: .5rem; }

.state-msg {
  text-align: center; padding: 3rem 1rem;
  color: var(--text3); font-size: 14px;
}
.err-bar {
  background: var(--red-bg);
  border: 1px solid var(--red-border);
  border-radius: var(--radius-sm);
  padding: .75rem 1rem;
  color: var(--red);
  font-size: 13px;
  margin-bottom: 1rem;
}

.score-strip {
  display: flex; align-items: center; gap: 10px;
  margin-top: .75rem;
}
.score-bar-bg {
  flex: 1; height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%; border-radius: 3px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
}
.score-num {
  font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 22px;
  letter-spacing: -0.02em;
}

.sector-badge {
  font-size: 10px; padding: 2px 7px;
  border-radius: 4px;
  background: var(--bg3);
  color: var(--text2);
  border: 1px solid var(--border);
  margin-left: 6px;
}

.card-select {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
  border-radius: 4px;
  font-size: 11px;
  padding: 3px 6px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  cursor: pointer;
  transition: all .2s;
}
.card-select:hover { border-color: var(--accent); color: var(--text); }
.card-select option { background: var(--bg2); color: var(--text); }
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <img src="Logo MCM.jpeg" alt="Mills Capital Markets" class="header-logo">
    <div>
      <div class="header-title">Líneas de Crédito</div>
      <div class="header-sub">Empresas Corporativas — Mercado Local ARG</div>
    </div>
  </div>
  <div class="header-right">
    <div class="tl-indicator">
      <div class="status-dot loading" id="status-dot"></div>
      <span id="status-txt" style="font-size:12px;color:var(--text2)">Cargando...</span>
    </div>
    <button class="btn-refresh" onclick="reloadData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Actualizar
    </button>
  </div>
</header>

<main class="main">

  <div id="err-bar" class="err-bar" style="display:none"></div>

  <div class="legend-bar">
    <span style="font-size:12px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.06em">Estado</span>
    <div class="tl-indicator">
      <span class="tl-circle" style="background:var(--green)"></span>
      <span>Recomendable</span>
    </div>
    <div class="tl-indicator">
      <span class="tl-circle" style="background:var(--yellow)"></span>
      <span>Favorable -</span>
    </div>
    <div class="tl-indicator">
      <span class="tl-circle" style="background:var(--red)"></span>
      <span>No recomendable</span>
    </div>
    <span style="margin-left:auto;font-size:11px;color:var(--text3)">Segmentación según Mediana Histórica del Sector y de la propia Empresa</span>
  </div>

<div class="overview-card">
    <div class="section-head" style="justify-content: space-between; align-items: center;">
      <div style="display: flex; align-items: baseline; gap: 12px;">
        <h2>Comparativa General</h2>
        <span id="overview-period">—</span>
      </div>
<select id="overview-period-filter" onchange="onGlobalPeriodChange()" style="height: 32px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 12px; padding: 0 10px; font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none;">
</select>
    </div>
    <div class="chart-wrap">
      <canvas id="overview-chart"></canvas>
    </div>
  </div>

  <div class="filters">
    <input type="text" id="search" placeholder="Buscar empresa, ticker o sector..." oninput="renderCards()">
    <select id="sec-filter" onchange="renderCards()">
      <option value="">Todos los sectores</option>
    </select>
    <select id="type-filter" onchange="renderCards()">
      <option value="">Todos los tipos</option>
      <option value="Banco">Solo bancos</option>
      <option value="General">Solo no bancos</option>
    </select>
    <select id="estado-filter" onchange="renderCards()">
      <option value="">Todos los estados</option>
      <option value="g">Recomendables</option>
      <option value="y">Favorables -</option>
      <option value="r">No recomendables</option>
    </select>
    <select id="sort-filter" onchange="renderCards()">
      <option value="score-desc">Mayor score primero</option>
      <option value="score-asc">Menor score primero</option>
      <option value="name">Nombre A-Z</option>
    </select>
  </div>

  <div class="section-head">
    <h2>Empresas</h2>
    <span id="count-label">—</span>
  </div>

  <div id="loading-msg" class="state-msg">Cargando datos desde Google Sheets...</div>
  <div class="cards" id="cards"></div>
</main>

<script>
const SHEET_ID = '1WoPfQhiJsAZ-9Pty_PnZWYI3kcE_qaE0f73FFMAFP-0';
const GVZ = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=';

let allData = [];
let overviewChart = null;
let detailCharts = {};
let expanded = {};
let selectedCardPeriods = {};

function setStatus(state, msg) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-txt');
  dot.className = 'status-dot ' + (state === 'ok' ? '' : state);
  txt.textContent = msg;
}

async function fetchSheet(name) {
  const res = await fetch(GVZ + encodeURIComponent(name));
  const text = await res.text();
  const json = JSON.parse(text.replace(/^[^(]+\(|\);?\s*$/g, ''));
  const cols = json.table.cols.map(c => c.label);
  return (json.table.rows || []).map(r => {
    const obj = {};
    r.c.forEach((cell, i) => {
      obj[cols[i]] = cell ? (cell.v !== null && cell.v !== undefined ? cell.v : (cell.f || '')) : '';
    });
    return obj;
  });
}

function parseDate(v) {
  if (!v) return null;
  if (v instanceof Date) return v;
  if (typeof v === 'number') return new Date((v - 25569) * 86400000);
  const s = String(v);
  const gMatch = s.match(/Date\((\d{4}),(\d+),(\d+)\)/);
  if (gMatch) return new Date(+gMatch[1], +gMatch[2], +gMatch[3]);
  const p = s.split('/');
  if (p.length === 3) {
    const y = p[2].length === 2 ? '20' + p[2] : p[2];
    return new Date(+y, +p[1] - 1, +p[0]);
  }
  return new Date(s);
}

function fmtDate(v) {
  const d = parseDate(v);
  if (!d || isNaN(d)) return String(v);
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: '2-digit' });
}

function fmtVal(v, key = '') {
  if (v === '' || v === null || v === undefined) return '—';
  const s = String(v);
  if (s.toLowerCase().includes('no mkt') || s.toLowerCase().includes('no market')) return '—';
  const cleanStr = s.replace(',', '.');
  if (!isNaN(parseFloat(cleanStr))) {
    const num = parseFloat(cleanStr);
    if (key === 'Net CapEx') {
      const fmt = new Intl.NumberFormat('es-AR', {
        style: 'currency',
        currency: 'ARS',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      }).format(num);
      if (num < 0) return `<span style="color: var(--red);">${fmt}</span>`;
      return fmt;
    }
    if (key === 'Márgen' || key === 'Crecimiento Ventas') {
      return (num * 100).toFixed(0) + '%';
    }
    if (key.includes('Mkt. Cap')) {
      return num.toFixed(2);
    }
    return parseFloat(num.toFixed(3)).toString();
  }
  return s;
}

function estadoToColor(estado) {
  const s = String(estado || '').trim().toLowerCase();
  if (s === 'recomendable') return 'g';
  if (s.startsWith('favorable')) return 'y';
  if (s === 'no recomendable') return 'r';
  return 'y';
}

function getColor(e) {
  return estadoToColor(e.estado);
}

function colorHex(c) {
  return c === 'g' ? '#2ecc8a' : c === 'y' ? '#f0b429' : '#e85454';
}

async function reloadData() {
  setStatus('loading', 'Cargando...');
  document.getElementById('loading-msg').style.display = 'block';
  document.getElementById('cards').innerHTML = '';
  document.getElementById('err-bar').style.display = 'none';
  try {
    const [empresas, ratiosGen, ratiosBanco] = await Promise.all([
      fetchSheet('Empresa'),
      fetchSheet('Ratios No Bancos'),
      fetchSheet('Ratios Bancos')
    ]);
    const bancosIds = new Set(
      empresas.filter(e => String(e['Sector'] || '').toLowerCase().includes('banco'))
              .map(e => String(e['Empresa ID']))
    );
    allData = empresas.map(emp => {
      const id = String(emp['Empresa ID']);
      const esBanco = bancosIds.has(id);
      const src = esBanco ? ratiosBanco : ratiosGen;
      const ratios = src.filter(r => String(r['Empresa ID']) === id);
      ratios.sort((a, b) => {
        const da = parseDate(a['Trimestre']), db = parseDate(b['Trimestre']);
        return (+da || 0) - (+db || 0);
      });
      const last = ratios[ratios.length - 1] || {};
      const score = parseFloat(last['Score']) || 0;
      const estado = String(last['Estado'] || '').trim();
      const ratioKeys = esBanco
        ? ['Resultado Final / Ventas','Mkt. Cap / Ventas','Mkt. Cap / PN','Márgen','Crecimiento Ventas','Apalancamiento','Cartera en Situación 2 a 5','Previsiones sobre Cartera Irregular Total','Total Cartera Irregular / Total Financiaciones','Efectivo y Depósito en Bancos / Activo','Absorción de Gastos de Ad. con Volúmen de Negocio','Rendimiento Anual del Patrimonio','Retorno sobre Activos','Liquidez Tit c/cot, POS. CALL, LELIQ, LEFIs']
        : ['Activo Corriente/ Pasivo Corriente','Deuda Financiera Total / EBITDA','Pasivo Total / Patrimonio Neto','Deuda Bancaria.CP / Patrimonio Neto','Resultado Final / Ventas','EBITDA / Intereses','EBITDA / PN + Related Companies (Pasivo)','PN / Bienes de Uso','Mkt. Cap / Resultado Final Normalizado','Deuda Financiera Neta + Mkt. Cap / EBITDA','EBITDA / Activos Totales','Mkt. Cap / Ventas','Mkt. Cap / PN','Net CapEx','Ratio Sector','Márgen','Crecimiento Ventas'];
      return {
        id,
        nombre: emp['Nombre'] || emp['Ticker'] || id,
        sector: emp['Sector'] || '',
        ticker: emp['Ticker'] || '',
        tipo: esBanco ? 'Banco' : 'General',
        score, estado, ratios, last, ratioKeys,
        history: ratios.map(r => ({
          label: fmtDate(r['Trimestre']),
          score: parseFloat(r['Score']) || 0,
          estado: String(r['Estado'] || '').trim()
        }))
      };
    }).filter(e => e.ratios.length > 0);
    const sectors = [...new Set(allData.map(e => e.sector).filter(Boolean))].sort();
    const sel = document.getElementById('sec-filter');
    sel.innerHTML = '<option value="">Todos los sectores</option>';
    sectors.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      sel.appendChild(o);
    });
    const bankPeriods = new Set();
    const genPeriods = new Set();
    allData.forEach(e => {
      e.history.forEach(h => {
        if (e.tipo === 'Banco') bankPeriods.add(h.label);
        else genPeriods.add(h.label);
      });
    });
    const commonPeriods = Array.from(bankPeriods).filter(p => genPeriods.has(p));
    const sortedCommon = commonPeriods.sort((a, b) => {
      const pa = a.split('/');
      const pb = b.split('/');
      const da = new Date(`20${pa[2]}-${pa[1]}-${pa[0]}`);
      const db = new Date(`20${pb[2]}-${pb[1]}-${pb[0]}`);
      return db - da; 
    });
    const overviewSel = document.getElementById('overview-period-filter');
    if (overviewSel) {
      overviewSel.innerHTML = '';
      sortedCommon.forEach(p => {
        const o = document.createElement('option');
        o.value = p; o.textContent = 'Período: ' + p;
        overviewSel.appendChild(o);
      });
      if (sortedCommon.length > 0) {
        document.getElementById('overview-period').textContent = 'Mostrando: ' + sortedCommon[0];
      }
    }
    setStatus('ok', 'Datos actualizados');
    document.getElementById('loading-msg').style.display = 'none';
    renderOverview();
    renderCards();
  } catch (err) {
    setStatus('error', 'Error al cargar');
    document.getElementById('loading-msg').style.display = 'none';
    const eb = document.getElementById('err-bar');
    eb.textContent = 'No se pudieron cargar los datos. Verificá que el Sheet sea público (solo lectura). Error: ' + err.message;
    eb.style.display = 'block';
  }
}

function renderOverview() {
  const selectedPeriod = document.getElementById('overview-period-filter') ? document.getElementById('overview-period-filter').value : '';
  if (selectedPeriod) {
    document.getElementById('overview-period').textContent = 'Mostrando: ' + selectedPeriod;
  }
  const periodData = [];
  allData.forEach(e => {
    let targetScore = null;
    let targetEstado = null;
    if (!selectedPeriod) {
      targetScore = e.score;
      targetEstado = e.estado;
    } else {
      const h = e.history.find(x => x.label === selectedPeriod);
      if (h) {
        targetScore = h.score;
        targetEstado = h.estado;
      }
    }
    if (targetScore !== null) {
      periodData.push({
        nombre: e.nombre,
        score: targetScore,
        estado: targetEstado
      });
    }
  });
  const sorted = periodData.sort((a, b) => b.score - a.score);
  const labels = sorted.map(e => e.nombre);
  const scores = sorted.map(e => e.score);
  const colors = sorted.map(e => colorHex(estadoToColor(e.estado)));
  if (overviewChart) overviewChart.destroy();
  overviewChart = new Chart(document.getElementById('overview-chart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: scores,
        backgroundColor: colors.map(c => c + '33'),
        borderColor: colors,
        borderWidth: 1.5,
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' Score: ' + Math.round(ctx.parsed.y),
            title: ctx => sorted[ctx[0].dataIndex].nombre
          }
        }
      },
      scales: {
        y: {
          max: 1000,
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#e8eaf0', font: { size: 11, weight: 'normal' }, stepSize: 250 },
          border: { color: 'transparent' }
        },
        x: {
          grid: { display: false },
          ticks: { 
            color: '#e8eaf0', 
            font: { size: 10, weight: 'normal' }, 
            maxRotation: 45, 
            minRotation: 45 
          },
          border: { color: 'transparent' }
        }
      }
    }
  });
}

function onGlobalPeriodChange() {
  selectedCardPeriods = {};
  renderOverview();
  renderCards();
}

function getFiltered() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const sec = document.getElementById('sec-filter').value;
  const tipo = document.getElementById('type-filter').value;
  const sort = document.getElementById('sort-filter').value;
  const est = document.getElementById('estado-filter').value;
  const globalPeriod = document.getElementById('overview-period-filter') ? document.getElementById('overview-period-filter').value : '';

  const getHistAtPeriod = (emp, period) => {
    if (!period) return { score: emp.score, estado: emp.estado };
    const h = emp.history.find(x => x.label === period);
    return h || { score: emp.score, estado: emp.estado };
  };

  let list = allData.filter(e => {
    const mq = !q || e.nombre.toLowerCase().includes(q) || e.ticker.toLowerCase().includes(q) || e.sector.toLowerCase().includes(q);
    const ms = !sec || e.sector === sec;
    const mt = !tipo || e.tipo === tipo;

    const hist = getHistAtPeriod(e, globalPeriod);
    const col = estadoToColor(hist.estado);
    const me = !est || col === est;

    return mq && ms && mt && me;
  });

  if (sort === 'score-desc') list.sort((a, b) => getHistAtPeriod(b, globalPeriod).score - getHistAtPeriod(a, globalPeriod).score);
  else if (sort === 'score-asc') list.sort((a, b) => getHistAtPeriod(a, globalPeriod).score - getHistAtPeriod(b, globalPeriod).score);
  else list.sort((a, b) => a.nombre.localeCompare(b.nombre));

  return list;
}

function createCardHTML(e, selectedPeriod, isOpen) {
  let targetIdx = e.history.length - 1;
  if (selectedPeriod !== '') {
    const foundIdx = e.history.findIndex(x => x.label === selectedPeriod);
    if (foundIdx !== -1) targetIdx = foundIdx;
  }
  const currentHist = e.history[targetIdx] || {};
  const targetScore = currentHist.score || 0;
  const targetEstado = currentHist.estado || '—';
  const targetLabel = currentHist.label || '—';
  const prevHist = targetIdx > 0 ? e.history[targetIdx - 1] : null;
  const prevScore = prevHist ? prevHist.score : null;
  const delta = prevScore !== null ? Math.round(targetScore - prevScore) : null;
  const deltaHtml = delta !== null
    ? `<span style="font-size:11px;color:${delta >= 0 ? 'var(--green)' : 'var(--red)'};">${delta >= 0 ? '+' : ''}${delta}</span>`
    : '';
  const col = estadoToColor(targetEstado);
  const hex = colorHex(col);
  const pct = Math.round((targetScore / 1000) * 100);
  let targetData = {};
  const targetRatio = e.ratios.find(r => fmtDate(r['Trimestre']) === targetLabel);
  if (targetRatio) targetData = targetRatio;
  const periodOptions = [...e.history].reverse().map(h => {
    const selected = h.label === targetLabel ? 'selected' : '';
    return `<option value="${h.label}" ${selected}>${h.label}</option>`;
  }).join('');
  const qualiKeys = ['Character Accionistas', 'Track Record', 'Perspectiva del Negocio'];
  const qualiHtml = qualiKeys.map(k => {
    const v = targetData[k] || '—';
    return `<div class="quali-row"><span class="quali-key">${k}</span><span class="quali-val">${v}</span></div>`;
  }).join('');
  const ratioHtml = e.ratioKeys.map(k => {
    const raw = targetData[k];
    const v = fmtVal(raw, k);
    const isNoMkt = String(raw || '').toLowerCase().includes('no mkt') || String(raw || '').toLowerCase().includes('no market');
    return `<div class="rchip"><div class="rchip-label">${k}</div><div class="rchip-val${isNoMkt ? ' no-mkt' : ''}">${v}</div></div>`;
  }).join('');
  return `
  <div class="ccard border-${col}${isOpen ? ' expanded' : ''}" id="card-${e.id}" onclick="toggleCard(event,'${e.id}')">
    <div class="ccard-head">
      <div class="score-ring ring-${col}">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle cx="26" cy="26" r="22" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="3"/>
          <circle cx="26" cy="26" r="22" fill="none" stroke="${hex}" stroke-width="3"
            stroke-dasharray="${Math.round(2*Math.PI*22*targetScore/1000)} ${Math.round(2*Math.PI*22)}"
            stroke-linecap="round"/>
        </svg>
        <span>${Math.round(targetScore)}</span>
      </div>
      <div class="ccard-meta">
        <div class="ccard-name">${e.nombre}<span class="sector-badge">${e.sector}</span></div>
        <div class="ccard-sub">${e.ticker ? e.ticker + ' · ' : ''}Último balance: ${targetLabel} ${deltaHtml}</div>
        <div class="score-strip" style="margin-top:6px">
          <div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%;background:${hex}"></div></div>
          <span style="font-size:10px;color:var(--text3);min-width:32px;text-align:right">${targetScore > 0 ? (targetScore/10).toFixed(0)+'%' : '—'}</span>
        </div>
      </div>
      <span class="pill ${e.tipo === 'Banco' ? 'pill-banco' : 'pill-gen'}">${e.tipo === 'Banco' ? 'Banco' : 'No banco'}</span>
      <span class="pill" style="background:${hex}22;color:${hex};border:1px solid ${hex}44">${targetEstado}</span>
      <div class="traffic-light">
        <div class="tl-dot ${col === 'r' ? 'on-r' : ''}"></div>
        <div class="tl-dot ${col === 'y' ? 'on-y' : ''}"></div>
        <div class="tl-dot ${col === 'g' ? 'on-g' : ''}"></div>
      </div>
      <span class="chev ${isOpen ? 'open' : ''}">▼</span>
    </div>
    <div class="ccard-detail ${isOpen ? 'open' : ''}" id="detail-${e.id}">
      <div class="detail-grid">
        <div>
          <div class="sub-label">Factores cualitativos</div>
          <div class="quali-list" id="quali-${e.id}">${qualiHtml}</div>
        </div>
        <div>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:.75rem">
            <div class="sub-label" style="margin-bottom:0">Ratios — período</div>
            <select class="card-select" onclick="event.stopPropagation()" onchange="updateCardPeriod(event, '${e.id}', this.value)">
              ${periodOptions}
            </select>
          </div>
          <div class="ratio-chips" id="ratios-${e.id}">${ratioHtml}</div>
        </div>
      </div>
      <div class="history-section">
        <div class="sub-label">Historial de score</div>
        <div class="history-chart-wrap"><canvas id="hchart-${e.id}"></canvas></div>
      </div>
    </div>
  </div>`;
}

function renderCards() {
  const filtered = getFiltered();
  const globalPeriod = document.getElementById('overview-period-filter') ? document.getElementById('overview-period-filter').value : '';

  document.getElementById('count-label').textContent = filtered.length + ' empresa' + (filtered.length !== 1 ? 's' : '');

  Object.keys(detailCharts).forEach(k => { try { detailCharts[k].destroy(); } catch (e) {} });
  detailCharts = {};

  const container = document.getElementById('cards');
  if (!filtered.length) {
    container.innerHTML = '<div class="state-msg">No se encontraron empresas.</div>';
    return;
  }

  container.innerHTML = filtered.map(e => {
    const isOpen = !!expanded[e.id];
    const currentPeriod = selectedCardPeriods[e.id] || globalPeriod;
    return createCardHTML(e, currentPeriod, isOpen);
  }).join('');

  filtered.forEach(e => {
    if (expanded[e.id]) setTimeout(() => drawDetailChart(e), 60);
  });
}

function updateCardPeriod(event, id, selectedPeriod) {
  event.stopPropagation();
  const e = allData.find(x => x.id === id);
  if (!e) return;
  selectedCardPeriods[id] = selectedPeriod;
  const cardEl = document.getElementById('card-' + id);
  if (cardEl) {
    cardEl.outerHTML = createCardHTML(e, selectedPeriod, !!expanded[id]);
    if (expanded[id]) {
      setTimeout(() => drawDetailChart(e), 10);
    }
  }
}

function toggleCard(event, id) {
  expanded[id] = !expanded[id];
  const card = document.getElementById('card-' + id);
  const detail = document.getElementById('detail-' + id);
  const chev = card.querySelector('.chev');
  if (expanded[id]) {
    card.classList.add('expanded');
    detail.classList.add('open');
    chev.classList.add('open');
    const e = allData.find(x => x.id === id);
    if (e) setTimeout(() => drawDetailChart(e), 60);
  } else {
    card.classList.remove('expanded');
    detail.classList.remove('open');
    chev.classList.remove('open');
    if (detailCharts[id]) { detailCharts[id].destroy(); delete detailCharts[id]; }
  }
}

function drawDetailChart(e) {
  const canvas = document.getElementById('hchart-' + e.id);
  if (!canvas) return;
  if (detailCharts[e.id]) detailCharts[e.id].destroy();
  const col = getColor(e);
  const hex = colorHex(col);
  const pointColors = e.history.map(h => colorHex(estadoToColor(h.estado)));
  const hasNegative = e.history.some(h => h.score < 0);
  const yScaleConfig = {
    max: 1000,
    grid: { color: 'rgba(255,255,255,0.04)' },
    ticks: { color: '#555a6a', font: { size: 10 }, stepSize: 250 },
    border: { color: 'transparent' }
  };
  if (!hasNegative) {
    yScaleConfig.min = 0;
    yScaleConfig.beginAtZero = true;
  } else {
    delete yScaleConfig.min;
    yScaleConfig.beginAtZero = false;
  }
  const allLabelsPlugin = {
    id: 'allLabels',
    afterDatasetsDraw(chart) {
      const { ctx } = chart;
      const meta = chart.getDatasetMeta(0);
      const dataset = chart.data.datasets[0].data;
      ctx.save();
      ctx.font = '600 11px "DM Sans", sans-serif';
      ctx.fillStyle = '#e8eaf0';
      ctx.textAlign = 'center';
      dataset.forEach((val, i) => {
        const point = meta.data[i];
        if (!point) return;
        const x = point.x;
        let y = point.y;
        if (val >= 0) {
          ctx.textBaseline = 'bottom';
          y -= 8;
        } else {
          ctx.textBaseline = 'top';
          y += 8;
        }
        ctx.fillText(Math.round(val), x, y);
      });
      ctx.restore();
    }
  };
  detailCharts[e.id] = new Chart(canvas, {
    type: 'line',
    data: {
      labels: e.history.map(h => h.label),
      datasets: [{
        data: e.history.map(h => h.score),
        borderColor: hex + '66',
        borderWidth: 2,
        backgroundColor: hex + '10',
        fill: true,
        tension: 0,
        pointBackgroundColor: pointColors,
        pointBorderColor: '#0d0f14',
        pointBorderWidth: 2,
        pointRadius: 5,
        pointHoverRadius: 8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => ' Score: ' + Math.round(ctx.parsed.y) }
        }
      },
      scales: {
        y: yScaleConfig,
        x: {
          grid: { display: false },
          ticks: { color: '#555a6a', font: { size: 10 }, maxRotation: 45, autoSkip: false },
          border: { color: 'transparent' }
        }
      }
    },
    plugins: [allLabelsPlugin]
  });
}

reloadData();
</script>

</html>
